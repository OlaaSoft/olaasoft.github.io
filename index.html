<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OlaaSoft — Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.7;
      color: #1a1a2e;
      background: #fafafa;
      padding: 20px;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 32px; }
    .app-card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .app-name { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .links { display: flex; gap: 16px; }
    .links a {
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .links a:hover { text-decoration: underline; }
    .footer { margin-top: 48px; font-size: 13px; color: #999; }
    @media (prefers-color-scheme: dark) {
      body { background: #0b0f1a; color: #e2e8f0; }
      h1 { color: #f1f5f9; }
      .app-card { background: #131827; border-color: #253049; }
      .app-name { color: #f1f5f9; }
      .footer { color: #64748b; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OlaaSoft Legal</h1>

    <div class="app-card">

    <div class="app-card">

    </div>

    <div class="app-card">

      <div class="links">
        <a href="patches/privacy.html">Privacy Policy</a>
        <a href="patches/terms.html">Terms of Service</a>
      </div>
    </div>

    <div class="app-card">

        <a href="mergio/privacy.html">Privacy Policy</a>

        <a href="shorts/privacy.html">Privacy Policy</a>

    <div class="footer">
      &copy; 2026 OlaaSoft. All rights reserved.
    </div>

</html>
